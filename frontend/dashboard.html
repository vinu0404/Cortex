<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; }
    .stat-card .val { font-size:28px; font-weight:700; letter-spacing:-1px; }
    .stat-card .lbl { color:var(--text-muted); font-size:12px; margin-top:2px; }
    .section-card { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
    .conn-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:14px; font-size:12px; background:var(--surface); border:1px solid var(--border); }
  </style>
</head>
<body>

<nav style="padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between;">
  <div style="display:flex; align-items:center; gap:12px;">
    <a href="/index.html" style="color:var(--text-muted); font-size:13px;">← Workspaces</a>
    <span style="color:var(--border);">|</span>
    <span style="font-weight:600; font-size:15px;">Dashboard</span>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <span id="user-email" style="font-size:13px; color:var(--text-muted);"></span>
    <div class="nav-divider"></div>
    <select id="tz-select" class="tz-select" onchange="setTimezone(this.value)" title="Your timezone"></select>
    <a id="admin-link" href="/admin.html" class="btn btn-secondary btn-sm hidden">Admin Panel</a>
  </div>
</nav>

<main style="max-width:1100px; margin:0 auto; padding:28px 24px;" class="page-enter">

  <!-- Stat cards row -->
  <div id="stat-cards" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:28px;"></div>

  <!-- Middle row: recent convs + connectors -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px;">

    <!-- Recent Conversations -->
    <div class="section-card">
      <h3 style="font-size:14px; font-weight:600; margin-bottom:12px;">Recent Conversations</h3>
      <div id="recent-convs"></div>
    </div>

    <!-- Active Connectors -->
    <div class="section-card">
      <h3 style="font-size:14px; font-weight:600; margin-bottom:12px;">Connected Services</h3>
      <div id="connectors-section"></div>
    </div>
  </div>

  <!-- Workspaces -->
  <div style="margin-bottom:28px;">
    <h3 style="font-size:15px; font-weight:600; margin-bottom:12px;">My Workspaces</h3>
    <div id="my-workspaces"></div>
  </div>

  <!-- Personas -->
  <div>
    <h3 style="font-size:15px; font-weight:600; margin-bottom:12px;">Personas</h3>
    <div style="margin-bottom:10px;">
      <button onclick="showModal('modal-persona')" class="btn btn-secondary btn-sm">+ Add Persona</button>
    </div>
    <div id="personas-list"></div>
  </div>

</main>

<!-- Persona Modal -->
<div id="modal-persona" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Persona</span>
      <button class="modal-close" onclick="hideModal('modal-persona')">×</button>
    </div>
    <form onsubmit="createPersona(event)" style="display:flex; flex-direction:column; gap:16px;">
      <div class="form-group">
        <label>Name</label>
        <input id="persona-name" class="input" placeholder="Formal Assistant" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input id="persona-desc" class="input" placeholder="Formal, structured responses">
      </div>
      <div class="form-group">
        <label>System Prompt</label>
        <textarea id="persona-prompt" class="textarea" placeholder="You are a formal assistant…" required style="min-height:100px;"></textarea>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button type="button" onclick="hideModal('modal-persona')" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="save-persona-btn" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
  requireAuth();

  async function init() {
    const [user, stats, recentConvs, connectors, workspaces, personas] = await Promise.all([
      apiGet('auth/me'),
      apiGet('auth/me/stats'),
      apiGet('auth/me/recent-conversations?limit=8'),
      apiGet('connectors/instances'),
      apiGet('workspaces?limit=50'),
      apiGet('personas'),
    ]);

    document.getElementById('user-email').textContent = user?.email || '';
    if (user?.role === 'admin') {
      document.getElementById('admin-link').classList.remove('hidden');
    }

    renderStats(stats);
    renderRecentConvs(recentConvs || [], workspaces?.items || []);
    renderConnectors(connectors || []);
    renderWorkspaces(workspaces?.items || []);
    renderPersonasList(personas || []);
  }

  function renderStats(s) {
    const cards = [
      { label: 'Workspaces',      value: s?.workspaces ?? '—' },
      { label: 'Agents',           value: s?.agents ?? '—' },
      { label: 'Conversations',    value: s?.conversations ?? '—' },
      { label: 'Messages',         value: s?.messages ?? '—' },
      { label: 'Cost',             value: s?.total_cost_usd != null ? `$${s.total_cost_usd.toFixed(4)}` : '—' },
      { label: 'Knowledge Bases',  value: s?.knowledge_bases ?? '—' },
      { label: 'Web Collections',  value: s?.website_collections ?? '—' },
      { label: 'Connectors',       value: s?.active_connectors ?? '—' },
    ];
    document.getElementById('stat-cards').innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="val">${c.value}</div>
        <div class="lbl">${c.label}</div>
      </div>`).join('');
  }

  function renderRecentConvs(convs, workspaces) {
    const wsMap = {};
    workspaces.forEach(w => { wsMap[w.id] = w; });
    const el = document.getElementById('recent-convs');
    if (!convs.length) {
      el.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">No conversations yet.</div>';
      return;
    }
    el.innerHTML = convs.map(c => {
      const ws = wsMap[c.workspace_id];
      return `<div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
        <div>
          <div style="font-size:13px; font-weight:500;">${esc(c.title || 'Untitled conversation')}</div>
          ${ws ? `<div style="font-size:11px; color:var(--text-muted);">${esc(ws.name)} · ${timeSince(c.created_at)}</div>` : `<div style="font-size:11px; color:var(--text-muted);">${timeSince(c.created_at)}</div>`}
        </div>
        <a href="/chat.html?workspace_id=${c.workspace_id}&conversation_id=${c.id}" class="btn btn-secondary btn-sm">Open</a>
      </div>`;
    }).join('');
  }

  function renderConnectors(instances) {
    const el = document.getElementById('connectors-section');
    if (!instances.length) {
      el.innerHTML = '<div style="color:var(--text-muted); font-size:13px; margin-bottom:10px;">No services connected.</div>';
    } else {
      el.innerHTML = '<div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">' +
        instances.map(i => `<span class="conn-pill">✓ ${esc(i.definition?.display_name || i.account_label || 'Connected')}</span>`).join('') +
        '</div>';
    }
    el.innerHTML += `<a href="/workspace.html" class="btn btn-secondary btn-sm">+ Add connector</a>`;
  }

  function renderWorkspaces(items) {
    document.getElementById('my-workspaces').innerHTML = items.map(ws => `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:500; font-size:14px;">${esc(ws.name)}</div>
          <div style="color:var(--text-muted); font-size:12px;">${new Date(ws.created_at).toLocaleDateString()}</div>
        </div>
        <div style="display:flex; gap:6px;">
          <a href="/chat.html?workspace_id=${ws.id}" class="btn btn-secondary btn-sm">Chat</a>
          <a href="/workspace.html?id=${ws.id}" class="btn btn-secondary btn-sm">Build</a>
        </div>
      </div>`).join('') || '<div style="color:var(--text-muted); font-size:13px;">No workspaces yet.</div>';
  }

  function renderPersonasList(list) {
    document.getElementById('personas-list').innerHTML = list.map(p => `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:500; font-size:14px;">${esc(p.name)}</div>
          ${p.description ? `<div style="color:var(--text-muted); font-size:12px;">${esc(p.description)}</div>` : ''}
        </div>
        <button onclick="deletePersona('${p.id}')" class="btn btn-danger btn-sm">Delete</button>
      </div>`).join('') || '<div style="color:var(--text-muted); font-size:13px;">No personas yet.</div>';
  }

  async function createPersona(e) {
    e.preventDefault();
    const btn = document.getElementById('save-persona-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await apiPost('personas', {
        name: document.getElementById('persona-name').value,
        description: document.getElementById('persona-desc').value || null,
        system_prompt: document.getElementById('persona-prompt').value,
      });
      hideModal('modal-persona');
      await init();
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save'; }
  }

  function deletePersona(id) {
    confirmDialog({
      title: 'Delete persona?',
      message: 'This persona will be permanently deleted.',
      confirmText: 'Delete',
      onConfirm: async () => {
        try { await apiDelete(`personas/${id}`); await init(); }
        catch (err) { toast(err.message, 'error'); }
      },
    });
  }

  function timeSince(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  _populateTzSelect();
  initTimezone().then(() => _populateTzSelect());
  init();
</script>
</body>
</html>
