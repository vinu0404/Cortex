<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex — Workspaces</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    /* Vinu sidebar */
    .vinu-msg { display:flex; gap:10px; }
    .vinu-msg.user { flex-direction:row-reverse; }
    .vinu-msg-avatar { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .vinu-msg.assistant .vinu-msg-avatar { background:var(--accent); color:#fff; }
    .vinu-msg.user .vinu-msg-avatar { background:var(--surface); color:var(--text); }
    .vinu-msg-body { max-width:75%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.55; }
    .vinu-msg.assistant .vinu-msg-body { background:var(--surface); color:var(--text); border-bottom-left-radius:4px; }
    .vinu-msg.user .vinu-msg-body { background:var(--accent); color:#fff; border-bottom-right-radius:4px; white-space:pre-wrap; }
    .vinu-msg-body p { margin:0 0 4px; }
    .vinu-msg-body ul, .vinu-msg-body ol { margin:4px 0; padding-left:18px; }
    .vinu-conv-row { padding:10px 12px; border-radius:var(--radius); border:1px solid var(--border); cursor:pointer; transition:background .12s; }
    .vinu-conv-row:hover { background:var(--surface); }
    .clarif-chip { display:inline-block; padding:4px 12px; border-radius:999px; border:1px solid var(--border); cursor:pointer; font-size:12px; margin:3px; background:var(--surface); color:var(--text); }
    .clarif-chip.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
    .vinu-typing { display:flex; gap:4px; align-items:center; padding:4px 0; }
    .vinu-typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:vinu-bounce 1.2s infinite; }
    .vinu-typing span:nth-child(2) { animation-delay:.2s; }
    .vinu-typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes vinu-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    #vinu-resize-handle { position:absolute; top:0; left:0; width:6px; height:100%; cursor:col-resize; z-index:10; }
    #vinu-resize-handle::after { content:''; position:absolute; top:0; left:2px; width:2px; height:100%; background:var(--accent); opacity:0; transition:opacity .15s; }
    #vinu-resize-handle:hover::after, #vinu-resize-handle.dragging::after { opacity:.5; }
  </style>
</head>
<body>

<!-- Nav -->
<nav style="border-bottom:1px solid var(--border); padding:0 24px; height:52px; display:flex; align-items:center; justify-content:space-between;">
  <span style="font-weight:700; font-size:16px; letter-spacing:-0.5px;">Cortex</span>
  <div style="display:flex; gap:12px; align-items:center;">
    <span id="user-email" style="font-size:13px; color:var(--text-muted);"></span>
    <a href="/knowledge-bases.html" class="btn btn-nav btn-sm">📚 Knowledge Bases</a>
    <a href="/website-collections.html" class="btn btn-nav btn-sm">🌐 Web Collections</a>
    <a href="/dashboard.html" class="btn btn-nav btn-sm">◈ Dashboard</a>
    <button onclick="toggleVinu()" id="vinu-toggle-btn" class="btn btn-nav btn-sm">✨ Vinu</button>
    <div class="nav-divider"></div>
    <button onclick="handleLogout()" class="btn btn-nav-signout btn-sm">Sign out</button>
  </div>
</nav>

<!-- Main -->
<main style="max-width:1100px; margin:0 auto; padding:32px 24px;">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;">
    <div>
      <h1 style="font-size:22px; font-weight:700;">Workspaces</h1>
      <p style="color:var(--text-muted); font-size:14px; margin-top:2px;">Build and manage your agent pipelines</p>
    </div>
    <button onclick="showModal('modal-create-ws')" class="btn btn-primary">+ New Workspace</button>
  </div>

  <div id="workspaces-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px;">
    <div style="display:flex; align-items:center; justify-content:center; height:160px; color:var(--text-muted);">
      <div class="spinner"></div>
    </div>
  </div>

  <div id="load-more-btn" class="hidden" style="text-align:center; margin-top:24px;">
    <button onclick="loadMore()" class="btn btn-secondary">Load more</button>
  </div>
</main>

<!-- Create Workspace Modal -->
<div id="modal-create-ws" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Workspace</span>
      <button class="modal-close" onclick="hideModal('modal-create-ws')">×</button>
    </div>
    <form onsubmit="createWorkspace(event)" style="display:flex; flex-direction:column; gap:16px;">
      <div class="form-group">
        <label>Name</label>
        <input id="ws-name" class="input" placeholder="My Agent Pipeline" required>
      </div>
      <div class="form-group">
        <label>Description <span style="color:var(--text-muted); font-weight:400;">(optional)</span></label>
        <textarea id="ws-desc" class="textarea" placeholder="What does this workspace do?"></textarea>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button type="button" onclick="hideModal('modal-create-ws')" class="btn btn-secondary">Cancel</button>
        <button type="submit" id="create-ws-btn" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Vinu Sidebar -->
<div id="vinu-sidebar" style="position:fixed;top:0;right:-440px;width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:right .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.15);">

  <div id="vinu-resize-handle"></div>

  <!-- Header -->
  <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="vinu-back-btn" onclick="showVinuList()" style="cursor:pointer;display:none;color:var(--text-muted);font-size:18px;margin-right:2px;">←</span>
      <span style="font-size:22px;">✨</span>
      <div>
        <div id="vinu-title" style="font-weight:700;font-size:15px;">Vinu</div>
        <div id="vinu-subtitle" style="font-size:11px;color:var(--text-muted);">AI Workspace Builder</div>
      </div>
    </div>
    <button onclick="toggleVinu()" class="btn btn-secondary btn-sm">×</button>
  </div>

  <!-- SETUP VIEW -->
  <div id="vinu-setup-view" style="display:none;flex:1;padding:32px 20px;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;">
    <div style="font-size:32px;">✨</div>
    <div style="font-size:16px;font-weight:600;">What should I call myself?</div>
    <div style="font-size:13px;color:var(--text-muted);">You can always think of me as your AI workspace builder. Give me a name or stick with the default.</div>
    <input id="vinu-name-input" class="input" style="text-align:center;font-size:15px;max-width:240px;" placeholder="Vinu">
    <div style="display:flex;gap:8px;">
      <button onclick="saveVinuName(document.getElementById('vinu-name-input').value || 'Vinu')" class="btn btn-primary">Let's go!</button>
      <button onclick="saveVinuName('Vinu')" class="btn btn-secondary">Skip (use Vinu)</button>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="vinu-list-view" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;">
    <button onclick="startNewVinuChat()" class="btn btn-primary" style="width:100%;margin-bottom:8px;">+ New Chat</button>
    <div id="vinu-conv-list" style="display:flex;flex-direction:column;gap:6px;"></div>
    <div id="vinu-load-more" style="display:none;text-align:center;margin-top:8px;">
      <button onclick="_vinuLoadConversations(false)" class="btn btn-secondary btn-sm">Load more</button>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="vinu-chat-view" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
    <div id="vinu-messages" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;"></div>
    <div id="vinu-plan" style="display:none;padding:16px 20px;border-top:1px solid var(--border);max-height:280px;overflow-y:auto;"></div>
    <div id="vinu-build-progress" style="display:none;padding:16px 20px;border-top:1px solid var(--border);max-height:200px;overflow-y:auto;font-size:12px;"></div>
    <div style="padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;">
      <div style="display:flex;gap:8px;align-items:flex-end;">
        <textarea id="vinu-input" class="input" style="flex:1;resize:none;height:60px;font-size:13px;"
          placeholder="Tell me what you want to build…"
          onkeydown="vinuKeydown(event)"></textarea>
        <button onclick="sendVinuMessage()" id="vinu-send-btn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>

</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/vinu.js"></script>
<script>
  if (window.marked) marked.setOptions({ breaks: true, gfm: true });
</script>
<script>
  requireAuth();

  let nextCursor = null;
  let hasNext = false;

  async function loadWorkspaces(reset = true) {
    if (reset) { nextCursor = null; document.getElementById('workspaces-grid').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:160px;color:var(--text-muted);"><div class="spinner"></div></div>'; }
    try {
      const params = new URLSearchParams({ limit: 20 });
      if (nextCursor) params.set('cursor', nextCursor);
      const data = await apiGet(`workspaces?${params}`);
      if (reset) document.getElementById('workspaces-grid').innerHTML = '';
      if (!data.items.length && reset) {
        document.getElementById('workspaces-grid').innerHTML = '<div style="color:var(--text-muted); padding:40px 0; text-align:center; grid-column:1/-1;">No workspaces yet — create one to get started.</div>';
        return;
      }
      data.items.forEach(ws => appendCard(ws));
      nextCursor = data.next_cursor;
      hasNext = data.has_next;
      document.getElementById('load-more-btn').classList.toggle('hidden', !hasNext);
    } catch (err) { toast(err.message, 'error'); }
  }

  function appendCard(ws) {
    const grid = document.getElementById('workspaces-grid');
    const card = document.createElement('div');
    card.className = 'card';
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px;">
        <h3 style="font-size:15px; font-weight:600;">${esc(ws.name)}</h3>
        <span class="badge">${new Date(ws.created_at).toLocaleDateString()}</span>
      </div>
      ${ws.description ? `<p style="color:var(--text-muted); font-size:13px; margin-bottom:16px; line-height:1.5;">${esc(ws.description)}</p>` : '<div style="margin-bottom:16px;"></div>'}
      <div style="display:flex; gap:8px;">
        <button onclick="event.stopPropagation(); goChat('${ws.id}')" class="btn btn-primary btn-sm">Chat</button>
        <button onclick="event.stopPropagation(); goWorkspace('${ws.id}')" class="btn btn-secondary btn-sm">Build</button>
        <button onclick="event.stopPropagation(); deleteWs('${ws.id}', this)" class="btn btn-danger btn-sm">Delete</button>
      </div>`;
    grid.appendChild(card);
  }

  async function loadMore() { await loadWorkspaces(false); }

  async function createWorkspace(e) {
    e.preventDefault();
    const btn = document.getElementById('create-ws-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      await apiPost('workspaces', {
        name: document.getElementById('ws-name').value,
        description: document.getElementById('ws-desc').value || null,
      });
      hideModal('modal-create-ws');
      document.getElementById('ws-name').value = '';
      document.getElementById('ws-desc').value = '';
      await loadWorkspaces();
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Create'; }
  }

  function deleteWs(id, btn) {
    confirmDialog({
      title: 'Delete workspace?',
      message: 'All agents, conversations and settings in this workspace will be permanently deleted.',
      confirmText: 'Delete',
      onConfirm: async () => {
        btn.disabled = true;
        try {
          await apiDelete(`workspaces/${id}`);
          await loadWorkspaces();
        } catch (err) { toast(err.message, 'error'); btn.disabled = false; }
      },
    });
  }

  function goChat(id) { window.location.href = `/chat.html?workspace_id=${id}`; }
  function goWorkspace(id) { window.location.href = `/workspace.html?id=${id}`; }

  function handleLogout() {
    confirmDialog({
      title: 'Sign out?',
      message: 'You will be returned to the login page.',
      confirmText: 'Sign out',
      confirmClass: 'btn-secondary',
      onConfirm: async () => {
        const rt = getRefreshToken();
        if (rt) { try { await apiPost('auth/logout', { refresh_token: rt }); } catch {} }
        clearTokens(); redirectToAuth();
      },
    });
  }

  async function loadUser() {
    try {
      const user = await apiGet('auth/me');
      document.getElementById('user-email').textContent = user.email;
    } catch {}
  }

  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  loadUser();
  loadWorkspaces();
</script>
</body>
</html>
